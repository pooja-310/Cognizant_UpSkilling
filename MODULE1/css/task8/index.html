<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Box Model Demo</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Box Model & Layout Demo</h1>

<!-- EVENT CARD -->
<div class="eventCard">
    <h2>Music Festival</h2>
    <p>Enjoy live concerts, food stalls, and entertainment zones.</p>
</div>

<div class="eventCard">
    <h2>Food Carnival</h2>
    <p>Explore street foods and traditional dishes.</p>
</div>

<!-- FORM -->
<div class="formBox">
    <h3>Registration Form</h3>

    <input type="text" placeholder="Enter Name" class="selectedField">
    <br><br>
    <input type="text" placeholder="Enter Email">
</div>

<!-- VISIBILITY DEMO -->
<div class="hiddenBox">
    This is visibility: hidden (space stays)
</div>

<div class="noneBox">
    This is display: none (space removed)
</div>

</body>
</html>
