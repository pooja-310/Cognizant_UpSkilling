<!DOCTYPE html>
<html>
<head>
    <title>Pricing Section</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <div class="row">

        <div class="col-md-4">

            <div class="card p-4 mb-4">

                <h3>Basic</h3>

                <h4>$10</h4>

                <button class="btn btn-primary">
                    Buy Now
                </button>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-4 mb-4">

                <h3>Standard</h3>

                <h4>$20</h4>

                <button class="btn btn-success">
                    Buy Now
                </button>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-4 mb-4">

                <h3>Premium</h3>

                <h4>$30</h4>

                <button class="btn btn-danger">
                    Buy Now
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
