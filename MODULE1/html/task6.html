<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Feedback</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f7fb;
        }
        .box {
            width: 45%;
            margin: 60px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px #d6e4ff;
        }
        input, select, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        img {
            width: 200px;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
        }
        button {
            padding: 10px 20px;
            background-color: #2c4a7a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #msg {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
    </style>
    <script>
        // Phone validation (onblur)
        function validatePhone() {
            let phone = document.getElementById("phone").value;
            if (phone.length !== 10 || isNaN(phone)) {
                alert("Enter valid 10-digit phone number");
            }
        }
        // Show fee (onchange)
        function showFee() {
            let event = document.getElementById("event").value;
            let fee = "";
            if (event === "music") fee = "₹500";
            else if (event === "food") fee = "₹300";
            else if (event === "marathon") fee = "₹700";
            document.getElementById("fee").innerText = "Event Fee: " + fee;
        }
        // Submit confirmation (onclick)
        function submitForm() {
            document.getElementById("msg").innerText =
                "Registration submitted successfully!";
        }
        // Image enlarge (ondblclick)
        function enlarge(img) {
            if (img.style.width === "200px") {
                img.style.width = "350px";
            } else {
                img.style.width = "200px";
            }
        }
        // Character counter (keyboard event)
        function countChars() {
            let text = document.getElementById("feedback").value;
            document.getElementById("count").innerText =
                "Characters: " + text.length;
        }
    </script>
</head>
<body>
    <div class="box">
        <h2>Event Feedback Form</h2>
        <!-- Phone (onblur) -->
        <input type="text" id="phone" placeholder="Enter phone number"
               onblur="validatePhone()" required>
        <!-- Event (onchange) -->
        <select id="event" onchange="showFee()" required>
            <option value="">Select Event</option>
            <option value="music">Music Festival</option>
            <option value="food">Food Fair</option>
            <option value="marathon">Marathon</option>
        </select>
        <p id="fee">Event Fee: </p>
        <!-- Image (ondblclick) -->
        <img src="event.jpg" alt="Event Image" ondblclick="enlarge(this)">
        <!-- Feedback (keyboard event) -->
        <textarea id="feedback" rows="4" placeholder="Your feedback..."
                  onkeyup="countChars()"></textarea>
        <p id="count">Characters: 0</p>
        <!-- Submit (onclick) -->
        <button onclick="submitForm()">Submit</button>
        <p id="msg"></p>
    </div>
</body>
</html>
