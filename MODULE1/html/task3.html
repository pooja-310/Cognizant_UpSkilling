<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f7fb;
        }
        #welcomeBanner {
            background-color: #cfe2ff; 
            padding: 25px;
            margin: 80px auto;
            width: 60%;
            border-radius: 12px;
        }
        .highlight {
            color: #1f4e79;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="welcomeBanner">
        <h1>Welcome to the Local Community Event Portal </h1>
        <p>
            Glad to see you again.
            <span style="color:red; font-weight:bold;">
                Special Offer: Register today and get free event updates!
            </span>
        </p>
        <p class="highlight">
            Explore your dashboard and latest updates here.
        </p>
    </div>
</body>
</html>
