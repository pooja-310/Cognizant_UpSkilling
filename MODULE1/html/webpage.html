<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Event Portal</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#eef3ff,#f7f9ff);
}

/* NAV */
nav{
    position:sticky;
    top:0;
    background:#1f3b6d;
    padding:15px;
    text-align:center;
    z-index:1000;
}

nav a{
    color:white;
    text-decoration:none;
    margin:12px;
    font-weight:bold;
}

/* MAIN WRAPPER */
.wrapper{
    width:75%;
    margin:auto;
    padding:20px;
    text-align:center;
}

/* SECTION CARD */
.card{
    background:white;
    margin:25px 0;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* WELCOME */
#welcomeBanner{
    background:#dbe9ff;
    border-radius:12px;
}

/* highlight */
.highlight{
    color:#1f4e79;
    font-weight:bold;
}

/* IMAGES */
img{
    width:140px;
    height:100px;
    margin:10px;
    border-radius:10px;
    border:2px solid #bcd3ff;
    transition:0.3s;
}

img:hover{
    transform:scale(1.1);
}

/* FORM */
input,select,textarea{
    width:80%;
    padding:10px;
    margin:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BUTTON */
button{
    padding:10px 18px;
    background:#1f3b6d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:8px;
}

button:hover{
    background:#2c4a7a;
}

/* VIDEO */
video{
    width:300px;
    border-radius:12px;
}
</style>

<script>

/* EVENT FEE */
function showFee(){
    let v=document.getElementById("event").value;
    let fee="";
    if(v=="music") fee="₹500";
    else if(v=="food") fee="₹300";
    else if(v=="marathon") fee="₹700";
    else if(v=="art") fee="₹400";
    else fee="";
    document.getElementById("fee").innerText="Fee: "+fee;
}

/* SUBMIT */
function submitForm(){
    document.getElementById("msg").innerText="Registration Successful ✔";
}

/* CHAR COUNT */
function countChars(){
    let t=document.getElementById("feedback").value;
    document.getElementById("count").innerText=t.length+" characters";
}

/* DOUBLE CLICK IMAGE */
function zoom(img){
    img.style.width = img.style.width==="140px"?"220px":"140px";
}

/* STORAGE */
function savePref(){
    localStorage.setItem("pref",document.getElementById("pref").value);
}

function loadPref(){
    let v=localStorage.getItem("pref");
    if(v) document.getElementById("pref").value=v;
}

function clearPref(){
    localStorage.clear();
    sessionStorage.clear();
    document.getElementById("pref").value="";
}

/* GEO */
function getLocation(){
    navigator.geolocation.getCurrentPosition(
        p=>{
            document.getElementById("geo").innerText=
            "Lat: "+p.coords.latitude+" | Lon: "+p.coords.longitude;
        },
        e=>{
            document.getElementById("geo").innerText="Location denied / error";
        },
        {enableHighAccuracy:true,timeout:20000}
    );
}

/* VIDEO */
function videoReady(){
    document.getElementById("vmsg").innerText="Video Ready 🎬";
}

/* DEBUG */
function debugTest(){
    let event="music";
    let fee=500;
    console.log(event,fee);
    debugger;
}

/* WARNING */
window.onbeforeunload=function(){
    return "Are you sure?";
}

</script>
</head>

<body onload="loadPref()">

<!-- NAV -->
<nav>
<a href="#home">Home</a>
<a href="#welcome">Welcome</a>
<a href="#gallery">Gallery</a>
<a href="#register">Register</a>
<a href="#feedback">Feedback</a>
<a href="#video">Video</a>
</nav>
<div class="wrapper">
<!-- HOME -->
<div class="card" id="home">
<h2>Community Event Portal</h2>
<p>Your One Stop Event Management System</p>
</div>
<!-- WELCOME -->
<div class="card" id="welcome">
<h2>Welcome User </h2>
<p>
Special Offer 
<span style="color:red;font-weight:bold">20% OFFER</span>
</p>

<p class="highlight">Enjoy Premium Events Access</p>
</div>
<!-- GALLERY -->
<div class="card" id="gallery">
<h2>Event Gallery</h2>
<img src="event1.jpg" ondblclick="zoom(this)">
<img src="event2.jpg">
<img src="event3.jpg">
<img src="event4.jpg">
<img src="event5.jpeg">
<img src="event6.jpeg">
</div>
<!-- REGISTER -->
<div class="card" id="register">
<h2>Event Registration</h2>
<input type="text" placeholder="Name" required autofocus>
<select id="event" onchange="showFee()">
<option value="">Select Event</option>
<option value="music">Music Festival</option>
<option value="food">Food Fair</option>
<option value="marathon">Marathon</option>
<option value="art">Art Expo</option>
</select>
<p id="fee"></p>
<button onclick="submitForm()">Register</button>
<p id="msg"></p>
<br>
<select id="pref" onchange="savePref()">
<option value="">Preference</option>
<option value="music">Music</option>
<option value="food">Food</option>
</select>
<button onclick="clearPref()">Clear Preferences</button>
<br><br>
<button onclick="getLocation()">Find Nearby Events</button>
<p id="geo"></p>
</div>
<!-- FEEDBACK -->
<div class="card" id="feedback">
<h2>Feedback</h2>
<textarea id="feedback" onkeyup="countChars()"></textarea>
<p id="count"></p>
<button onclick="debugTest()">Debug Test</button>
</div>
<!-- VIDEO -->
<div class="card" id="video">
<h2>Event Promo Video</h2>
<video controls oncanplay="videoReady()">
<source src="event-video.mp4">
</video>
<p id="vmsg"></p>
</div>
</div>
</body>
</html>
