<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Preferences</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f7fb;
        }

        .box {
            width: 40%;
            margin: 60px auto;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px #d6e4ff;
        }

        select, button {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
        }

        button {
            background-color: #2c4a7a;
            color: white;
            border: none;
            cursor: pointer;
        }

        #msg {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }
    </style>

    <script>
        function savePreference() {
            let eventType = document.getElementById("event").value;
            localStorage.setItem("preferredEvent", eventType);
        }
        function loadPreference() {
            let savedEvent = localStorage.getItem("preferredEvent");

            if (savedEvent) {
                document.getElementById("event").value = savedEvent;
                document.getElementById("msg").innerText =
                    "Last selected event restored ✔️";
            }
        }
        function clearPreferences() {
            localStorage.clear();
            sessionStorage.clear();

            document.getElementById("event").value = "";
            document.getElementById("msg").innerText =
                "Preferences cleared ";
        }
    </script>
</head>
<body onload="loadPreference()">
    <div class="box">
        <h2>Event Preferences</h2>
        <select id="event" onchange="savePreference()">
            <option value="">Select Event Type</option>
            <option value="music">Music Festival</option>
            <option value="food">Food Fair</option>
            <option value="marathon">Marathon</option>
            <option value="art">Art Exhibition</option>
        </select>
        <br>
        <button onclick="clearPreferences()">Clear Preferences</button>
        <p id="msg"></p>

    </div>

</body>
</html>
