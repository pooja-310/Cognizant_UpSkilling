<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fb;
            text-align: center;
        }
        .form-container {
            width: 40%;
            margin: 60px auto;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px #d6e4ff;
        }
        input, select, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            padding: 10px 20px;
            background-color: #2c4a7a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        output {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
    </style>
    <script>
        function showMessage() {
            let name = document.getElementById("name").value;
            document.getElementById("result").value =
                "Thank you " + name + "! Your registration is successful.";
        }
    </script>
</head>
<body>
    <div class="form-container">
        <h2>Event Registration</h2>
        <form onsubmit="showMessage(); return false;">
            <input type="text" id="name" placeholder="Enter your name" required autofocus>
            <input type="email" placeholder="Enter your email" required>
            <input type="date" required>
            <select required>
                <option value="">Select Event Type</option>
                <option>Music Festival</option>
                <option>Food Fair</option>
                <option>Marathon</option>
                <option>Art Exhibition</option>
            </select>
            <textarea placeholder="Your message" rows="4" required></textarea>
            <br><br>
            <button type="submit">Register</button>
            <output id="result"></output>
        </form>
    </div>
</body>
</html>
