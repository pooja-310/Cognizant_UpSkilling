<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nearby Events</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f7fb;
        }
        .box {
            width: 40%;
            margin: 80px auto;
            padding: 25px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px #d6e4ff;
        }
        button {
            padding: 10px 20px;
            background-color: #2c4a7a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #output {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
        #error {
            margin-top: 10px;
            font-weight: bold;
            color: red;
        }
    </style>
    <script>
        function findLocation() {
            const options = {
                enableHighAccuracy: true,
                timeout: 20000,   
                maximumAge: 0
            };
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    showPosition,
                    showError,
                    options
                );
            } else {
                document.getElementById("error").innerText =
                    "Geolocation not supported in this browser";
            }
        }

        function showPosition(position) {
            document.getElementById("error").innerText = "";

            document.getElementById("output").innerText =
                "Latitude: " + position.coords.latitude +
                " | Longitude: " + position.coords.longitude;
        }

        function showError(error) {
            switch (error.code) {

                case error.PERMISSION_DENIED:
                    document.getElementById("error").innerText =
                        "Location access denied. Please allow permission.";
                    break;

                case error.TIMEOUT:
                    document.getElementById("error").innerText =
                        "Location request timed out. Try again or enable GPS.";
                    break;

                case error.POSITION_UNAVAILABLE:
                    document.getElementById("error").innerText =
                        "Location information unavailable.";
                    break;

                default:
                    document.getElementById("error").innerText =
                        "Unknown error occurred.";
            }
        }
    </script>
</head>
<body>
    <div class="box">
        <h2>Find Nearby Events</h2>
        <button onclick="findLocation()">Find Nearby Events</button>
        <p id="output"></p>
        <p id="error"></p>
    </div>
</body>
</html>
