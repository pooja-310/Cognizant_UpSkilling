<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Invite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f7fb;
        }

        .container {
            width: 60%;
            margin: 60px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px #d6e4ff;
        }

        video {
            width: 320px;   /* reduced size */
            max-width: 100%;
            border-radius: 10px;
        }

        #msg {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
    </style>
    <script>
        function videoReady() {
            document.getElementById("msg").innerText =
                "Video ready to play ";
        }
        window.onbeforeunload = function () {
            return "You have unsaved changes. Are you sure you want to leave?";
        };
    </script>
</head>
<body>
    <div class="container">
        <h2>Event Promo Video</h2>
        <video controls oncanplay="videoReady()">
            <source src="event-video.mp4" type="video/mp4">
            Your browser does not support video tag.
        </video>
        <p id="msg"></p>
    </div>
</body>
</html>
