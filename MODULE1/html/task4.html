<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Event Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            text-align: center;
        }

        table {
            margin: 50px auto;
            border-collapse: collapse;
        }

        caption {
            font-size: 20px;
            font-weight: bold;
            color: #2c4a7a;
            margin-bottom: 20px;
        }

        td {
            padding: 15px;
            text-align: center;
        }

        .eventImg {
            width: 200px;
            height: 140px;
            border: 2px solid #bcd3ff;
            border-radius: 8px;
        }

        p {
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <table>
        <caption>Memorable Moments from City Events</caption>

        <tr>
            <td>
                <img src="event1.jpg" alt="Music Festival" title="Music Festival" class="eventImg">
                <p>Music Festival</p>
            </td>

            <td>
                <img src="event2.jpg" alt="Food Fair" title="Food Fair" class="eventImg">
                <p>Food Fair</p>
            </td>

            <td>
                <img src="event3.jpg" alt="Marathon" title="Marathon" class="eventImg">
                <p>Marathon</p>
            </td>
        </tr>

        <tr>
            <td>
                <img src="event4.jpg" alt="Cultural Dance" title="Cultural Dance" class="eventImg">
                <p>Cultural Dance</p>
            </td>

            <td>
                <img src="event5.jpeg" alt="Tree Plantation" title="Tree Plantation" class="eventImg">
                <p>Tree Plantation</p>
            </td>

            <td>
                <img src="event6.jpeg" alt="Art Exhibition" title="Art Exhibition" class="eventImg">
                <p>Art Exhibition</p>
            </td>
        </tr>

    </table>

</body>
</html>
